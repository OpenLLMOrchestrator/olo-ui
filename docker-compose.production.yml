# Production: combined app (olo-be + olo-ui) + Redis. Run from repo root.
# Copy env: cp .env.production.sample .env.production
#
# Usage:
#   docker compose -f docker-compose.production.yml up -d
#   App: http://localhost:3000  (or your host/load-balancer)

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  olo:
    build:
      context: .
      dockerfile: Dockerfile
    image: olo:latest
    env_file: .env.production
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
    ports:
      - "3000:80"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:

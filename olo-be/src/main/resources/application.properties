server.port=8082
spring.application.name=olo-be

# Redis (required for tenant list from olo:tenants). Set OLO_TENANT_IDS env for key name.
spring.data.redis.host=localhost
spring.data.redis.port=6379

# To run without Redis (tenant list will be empty), uncomment:
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# Tenant list Redis key: set env OLO_TENANT_IDS (e.g. olo:tenants); default olo:tenants if unset.
# olo.tenant.ids=olo:tenants
